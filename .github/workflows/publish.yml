name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  aur:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Strip leading 'v'
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" .aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" .aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: python-velocirag
          pkgbuild: .aur/PKGBUILD
          commit_username: Haseeb Khalid
          commit_email: haseeb.k.khalid@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.event.release.tag_name }}"
          force_push: true

  mcp-registry:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      id-token: write  # Required for GitHub OIDC auth
    steps:
      - uses: actions/checkout@v4

      - name: Download MCP Publisher
        run: |
          curl -L https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz | tar -xz
          chmod +x mcp-publisher

      - name: Update server.json version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # Strip leading 'v'
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" server.json

      - name: Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
