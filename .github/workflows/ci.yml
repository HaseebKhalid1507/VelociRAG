name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Cache ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/velocirag
          key: velocirag-models-minilm-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,graph]"

      - name: Lint
        run: ruff check src/

      - name: Test (core — no model loading)
        run: |
          pytest tests/test_rrf.py tests/test_chunker.py tests/test_graph.py tests/test_frontmatter.py tests/test_metadata.py -q --tb=short

      - name: Test (MCP + integration)
        run: |
          pytest tests/test_mcp.py tests/test_unified.py tests/test_store.py tests/test_cli.py -q --tb=short -k "not incremental and not modified_file and not deleted_file and not environment_variable and not dimensions"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install ruff
          ruff check src/
